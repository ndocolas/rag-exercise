services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag_eval_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_eval_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
